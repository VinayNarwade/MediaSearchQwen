services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: embedding_search_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: esearch
      POSTGRES_PASSWORD: esearch_pass
      POSTGRES_DB: esearch_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esearch -d esearch_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Flask API ──────────────────────────────────────────────────────────────
  # PASSWORD / STARTDATE are hardcoded in config.py – no env vars needed.
  # Pass --port, --batch_size, and --database_url at `docker compose run` time
  # or override the command below.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embedding_search_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "--port"
      - "5801"
      - "--working_dir"
      - "/app/work_dir"
      - "--batch_size"
      - "6"
      - "--database_url"
      - "postgresql://esearch:esearch_pass@postgres:5432/esearch_db"
    ports:
      - "5801:5801"
    volumes:
      # Persistent working directory: FAISS indices, licence files, model cache
      - work_dir:/app/work_dir
      # Uncomment to mount a pre-downloaded checkpoints folder (avoids re-download)
      # - ./checkpoints:/app/checkpoints:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5801/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  work_dir:
