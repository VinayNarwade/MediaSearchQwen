<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Activation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
         @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');
        :root {
      --sidebar-expanded-width: 250px;
      --sidebar-collapsed-width: 80px;
      --sidebar-bg: #ffffff;
      --sidebar-border: rgba(0, 0, 0, .08);
      --radius: 12px;
      /* Modern Color Palette */
      --primary: #4f46e5;
      /* Indigo */
      --primary-light: #eef2ff;
      --secondary: #64748b;
      /* Slate */
      --success: #10b981;
      --bg-body: #f8fafc;
      /* Very Light Slate */
      --surface: #ffffff;
      --border-color: #e2e8f0;
      /* Shared Design System */
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --secondary: #64748b;
      --success: #10b981;
      --bg-body: #f8fafc;
      --surface: #ffffff;
      --border-color: #e2e8f0;
      --sidebar-width: 260px;
      --radius-lg: 16px;
      --radius-md: 12px;

      /* Dimensions */
      --sidebar-width: 260px;
      --sidebar-collapsed: 80px;
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --header-height: 70px;
    }
        
         body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
             background-color: var(--bg-body);
        }

        .main-card {
            width: 100%;
            /* max-width: 450px; */
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            overflow: hidden;
             background: linear-gradient(145deg, #ffffff 0%, #eff6ff 100%);
        }

        .card-header-custom {
            color: black;
            padding: 2rem 1.5rem;
            text-align: center;
            border: none;
        }

        .card-body {
            padding: 2rem;
        }

        .status-badge-lg {
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .credit-display {
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid #e9ecef;
            text-align: center;
        }

        .credit-number {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3436;
            line-height: 1;
            margin-bottom: 0.2rem;
        }

        .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: 600;
            padding: 12px;
            transition: transform 0.2s;
        }
        .btn-custom:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            color: white;
        }
        .btn-custom:active { transform: translateY(0); }

        .form-floating > .form-control:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.25);
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card main-card">
        
        <div class="card-header-custom">
            <i class="bi bi-shield-check" style="font-size: 3rem;"></i>
            <h3 class="mt-3 mb-0 fw-bold">License Manager</h3>
            <p class="opacity-75 mb-0" style="font-size: 0.9rem;">Secure Activation Portal</p>
        </div>

        <div class="card-body">
            
            <div class="text-center mb-4">
                <span id="status-badge" class="badge bg-secondary status-badge-lg">
                    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                    Checking...
                </span>
            </div>

            <div id="active-view" style="display:none;">
                <div class="text-center text-success mb-2">
                    <i class="bi bi-check-circle-fill fs-4"></i>
                    <span class="fw-bold ms-2">System Activated</span>
                </div>
                
                <div class="credit-display">
                    <div class="text-muted small text-uppercase fw-bold mb-2">Remaining Balance</div>
                    <div class="credit-number" id="credits-count">0</div>
                    <div class="text-muted">Hours Available</div>
                </div>
            </div>

            <div id="activation-form" style="display:none;">
                <div class="alert alert-light border text-center mb-4" role="alert">
                    <small class="text-muted">
                        <i class="bi bi-info-circle me-1"></i> 
                        Enter your administrator password to activate this device.
                    </small>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password-input" placeholder="Password">
                    <label for="password-input"><i class="bi bi-key me-2"></i>Activation Password</label>
                </div>

                <button id="activate-btn" class="btn btn-primary btn-custom w-100 rounded-3 shadow-sm" onclick="activateLicense()">
                    <span id="btn-text">Activate License</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2" style="display:none;"></span>
                </button>
            </div>

            <div id="alert-box" class="alert mt-4 text-center" style="display: none;" role="alert"></div>

        </div>
    </div>
</div>

<script>
    // 1. Check Status on Load
    window.onload = checkStatus;

    async function checkStatus() {
        const badge = document.getElementById('status-badge');
        
        try {
            const res = await fetch('/licence-requirement', { method: 'POST' });
            const data = await res.json();
            const info = data.licensestatus;

            if (info.status === "License valid") {
                // Update UI for Active
                badge.className = "badge bg-success status-badge-lg shadow-sm";
                badge.innerHTML = '<i class="bi bi-check-lg me-1"></i> Active';
                
                document.getElementById('active-view').style.display = 'block';
                document.getElementById('activation-form').style.display = 'none';
                
                if(info["Remaining Hourly Credits"]) {
                    // Animate the number (optional nice touch)
                    document.getElementById('credits-count').innerText = info["Remaining Hourly Credits"];
                }
            } else {
                // Update UI for Inactive
                badge.className = "badge bg-danger status-badge-lg shadow-sm";
                badge.innerHTML = '<i class="bi bi-x-circle me-1"></i> Inactive';
                
                document.getElementById('active-view').style.display = 'none';
                document.getElementById('activation-form').style.display = 'block';
            }
        } catch (e) {
            badge.className = "badge bg-warning text-dark status-badge-lg";
            badge.innerText = "Connection Error";
        }
    }

    // 2. Activate License Logic
    async function activateLicense() {
        const passwordInput = document.getElementById('password-input');
        const btn = document.getElementById('activate-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const alertBox = document.getElementById('alert-box');

        // Reset UI
        alertBox.style.display = 'none';
        
        if (!passwordInput.value) {
            showAlert('Please enter a password', 'danger');
            passwordInput.focus();
            return;
        }

        // Loading State
        btn.disabled = true;
        btnText.innerText = "Verifying...";
        btnSpinner.style.display = 'inline-block';

        try {
            const res = await fetch('/activate-license', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: passwordInput.value })
            });

            const data = await res.json();

            if (data.success) {
                showAlert('Activation Successful! Reloading...', 'success');
                setTimeout(() => location.reload(), 1500);
            } else {
                showAlert(data.error || "Invalid Password", 'danger');
                resetBtn();
            }
        } catch (e) {
            showAlert('Server Connection Failed', 'danger');
            resetBtn();
        }
    }

    function showAlert(msg, type) {
        const box = document.getElementById('alert-box');
        box.className = `alert alert-${type} mt-4 text-center shadow-sm`;
        box.innerHTML = type === 'success' ? `<i class="bi bi-check-circle me-2"></i>${msg}` : `<i class="bi bi-exclamation-triangle me-2"></i>${msg}`;
        box.style.display = 'block';
    }

    function resetBtn() {
        const btn = document.getElementById('activate-btn');
        document.getElementById('btn-text').innerText = "Activate License";
        document.getElementById('btn-spinner').style.display = 'none';
        btn.disabled = false;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
